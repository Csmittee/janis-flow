<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janis Flow - Test</title>
    
    <!-- ===== YOUR INJECTOR ===== -->
    <script src="https://raw.githubusercontent.com/csmittee/js/refs/heads/main/injector.js"></script>
    
    <!-- SEO & META -->
    <meta name="description" content="Premium skateboards and surfskates">
    <meta property="og:image" content="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773341421/Eng_SEO_OG.png">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-container">
            <img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773772664/Janis-flow-logo.png" 
                 alt="Janis Flow" 
                 class="hero-logo">
            <h1>Let's flow!</h1>
            <p>Premium board sports from USA and Italy</p>
        </div>
    </section>
    
    <!-- Product Cards -->
    <main class="content">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-icon"><i class="fas fa-skateboard"></i></div>
                <h3 class="product-title">Flow Pro Board</h3>
                <button class="product-button">Ride Now</button>
            </div>
            <div class="product-card">
                <div class="product-icon"><i class="fas fa-water"></i></div>
                <h3 class="product-title">Surfskate Wave</h3>
                <button class="product-button">Catch Wave</button>
            </div>
            <div class="product-card">
                <div class="product-icon"><i class="fas fa-cubes"></i></div>
                <h3 class="product-title">Accessories</h3>
                <button class="product-button">Explore</button>
            </div>
        </div>
    </main>
    
    <!-- Test Script - UPDATED with longer timeout -->
    <script>
        console.log('🔍 Testing injector...');
        setTimeout(() => {
            if (document.querySelector('.navbar')) {
                console.log('✅ SUCCESS! Injector loaded!');
                console.log('🎨 Brand:', document.querySelector('.navbar') ? 'Navbar present' : 'Missing');
            } else {
                console.log('⏳ Still waiting for injector...');
                // Check again after 2 more seconds
                setTimeout(() => {
                    if (document.querySelector('.navbar')) {
                        console.log('✅ SUCCESS on second check!');
                    } else {
                        console.log('❌ Injector failed to load - check network tab for 404');
                    }
                }, 2000);
            }
        }, 1500); // Increased timeout
    </script>
</body>
</html>

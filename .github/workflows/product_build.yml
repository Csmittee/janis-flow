name: Product Page Generator

on:
  push:
    paths:
      - 'products.csv'
      - 'scripts/generate_product_pages.py'
    branches:
      - main

# Add this permissions section
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # This ensures the action can push back
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Generate product pages
        run: |
          python scripts/generate_product_pages.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add product/ th/product/ products.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate product pages from CSV [skip ci]"
          git push

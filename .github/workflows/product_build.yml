name: Product Page Generator

on:
  push:
    paths:
      - 'products.csv'
      - 'scripts/generate_product_pages.py'  # ← Changed filename
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Generate product pages
        run: |
          python scripts/generate_product_pages.py  # ← Changed filename
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Only add directories that exist
          git add product/ th/product/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate product pages from CSV [skip ci]"
          git push
